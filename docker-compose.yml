services:
  app:
    env_file:
      - .env
    build: .
    ports:
      - '5000:5000'
    environment:
      DATABASE_URL: ${DATABASE_URL}
      # REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - db
      # - redis

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bidding
    ports:
      - '5432:5432'

  # redis:
  #   image: redis:7
  #   ports:
  #     - '6379:6379'
